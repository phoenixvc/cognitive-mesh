###############################################################################
# Cognitive Mesh — Frontend Deploy Pipeline
#
# Trigger: Push to main (after build.yml succeeds) or manual dispatch.
# Flow:    Build Docker -> Push to ACR -> Deploy Staging -> Manual Gate -> Deploy Production
#
# Required secrets:
#   AZURE_CREDENTIALS         - Service principal JSON for az login (federated or secret)
#   ACR_LOGIN_SERVER          - e.g. cognitivemeshacr.azurecr.io
#   ACR_USERNAME              - ACR admin or SP username
#   ACR_PASSWORD              - ACR admin or SP password
#   AKS_CLUSTER_NAME          - AKS cluster name
#   AKS_RESOURCE_GROUP        - Resource group containing the AKS cluster
###############################################################################

name: Deploy Frontend

on:
  workflow_run:
    workflows: ["Build and Analyze"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_staging:
        description: "Skip staging deployment and deploy directly to production"
        required: false
        default: "false"
        type: boolean
      image_tag:
        description: "Override image tag (default: git SHA)"
        required: false
        type: string

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write    # For OIDC federated credentials (Azure)
  actions: read

env:
  IMAGE_NAME: cognitive-mesh-frontend
  KUSTOMIZE_VERSION: "5.4.3"

jobs:
  # -----------------------------------------------------------------------
  # 1. Build & Push Frontend Docker image to ACR
  # -----------------------------------------------------------------------
  build-and-push:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded (or if manually dispatched)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute image tag
        id: meta
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="sha-$(git rev-parse --short HEAD)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: src/UILayer/web
          file: src/UILayer/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.cognitivemesh.io
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # -----------------------------------------------------------------------
  # 2. Deploy Frontend to Staging
  # -----------------------------------------------------------------------
  deploy-staging:
    name: Deploy Frontend to Staging
    needs: build-and-push
    if: inputs.skip_staging != true
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.cognitivemesh.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v5
        with:
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: ${{ env.KUSTOMIZE_VERSION }}

      - name: Update image tag in staging overlay
        run: |
          cd k8s/overlays/staging
          kustomize edit set image \
            cognitive-mesh-frontend=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Apply staging manifests
        run: |
          kustomize build k8s/overlays/staging | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/cognitive-mesh-frontend \
            -n cognitive-mesh-staging \
            --timeout=300s

      - name: Run smoke tests
        run: |
          STAGING_URL="http://cognitive-mesh-frontend.cognitive-mesh-staging.svc.cluster.local:3000"
          for i in $(seq 1 30); do
            if kubectl exec -n cognitive-mesh-staging deploy/cognitive-mesh-frontend -- \
              wget --no-verbose --tries=1 --spider "${STAGING_URL}/api/health" > /dev/null 2>&1; then
              echo "Frontend staging health check passed"
              exit 0
            fi
            echo "Waiting for frontend staging to be ready... ($i/30)"
            sleep 10
          done
          echo "Frontend staging health check failed after 5 minutes"
          exit 1

  # -----------------------------------------------------------------------
  # 3. Deploy Frontend to Production (manual approval via GitHub Environment)
  # -----------------------------------------------------------------------
  deploy-production:
    name: Deploy Frontend to Production
    needs: [build-and-push, deploy-staging]
    # Run if staging succeeded, or if staging was skipped
    if: always() && needs.build-and-push.result == 'success' && (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://cognitivemesh.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v5
        with:
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: ${{ env.KUSTOMIZE_VERSION }}

      - name: Update image tag in production overlay
        run: |
          cd k8s/overlays/prod
          kustomize edit set image \
            cognitive-mesh-frontend=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Apply production manifests
        run: |
          kustomize build k8s/overlays/prod | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/cognitive-mesh-frontend \
            -n cognitive-mesh-prod \
            --timeout=600s

      - name: Verify production health
        run: |
          PROD_URL="http://cognitive-mesh-frontend.cognitive-mesh-prod.svc.cluster.local:3000"
          for i in $(seq 1 30); do
            if kubectl exec -n cognitive-mesh-prod deploy/cognitive-mesh-frontend -- \
              wget --no-verbose --tries=1 --spider "${PROD_URL}/api/health" > /dev/null 2>&1; then
              echo "Frontend production health check passed"
              exit 0
            fi
            echo "Waiting for frontend production to be ready... ($i/30)"
            sleep 10
          done
          echo "Frontend production health check failed after 5 minutes"
          exit 1

  # -----------------------------------------------------------------------
  # 4. Post-deploy notification
  # -----------------------------------------------------------------------
  notify:
    name: Notify on Failure
    if: failure()
    needs: [build-and-push, deploy-staging, deploy-production]
    runs-on: ubuntu-latest

    steps:
      - name: Send failure notification
        uses: rtCamp/action-slack-notify@v2
        if: env.SLACK_WEBHOOK != ''
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: "#FF0000"
          SLACK_TITLE: "Frontend Deployment Failed"
          SLACK_MESSAGE: |
            Frontend deployment of `${{ github.sha }}` failed.
            Workflow: ${{ github.workflow }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_USERNAME: "GitHub Actions"
