###############################################################################
# Cognitive Mesh — Frontend Deployment
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitive-mesh-frontend
  labels:
    app: cognitive-mesh
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cognitive-mesh
      component: frontend
  template:
    metadata:
      labels:
        app: cognitive-mesh
        component: frontend
    spec:
      serviceAccountName: cognitive-mesh
      containers:
        - name: cognitive-mesh-frontend
          image: cognitive-mesh-frontend:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: cognitive-mesh-frontend-config
                  key: NODE_ENV
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: cognitive-mesh-frontend-config
                  key: NEXT_PUBLIC_API_BASE_URL
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 30
