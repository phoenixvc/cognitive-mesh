###############################################################################
# Cognitive Mesh — Frontend Service
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: cognitive-mesh-frontend
  labels:
    app: cognitive-mesh
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: cognitive-mesh
    component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
