###############################################################################
# Cognitive Mesh — Frontend Ingress
# Path-based routing: / -> frontend, /api/* -> backend API
###############################################################################
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cognitive-mesh-ingress
  labels:
    app: cognitive-mesh
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Backend API routes
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: cognitive-mesh-api
                port:
                  name: http
          # Health check routes for the backend
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: cognitive-mesh-api
                port:
                  name: health
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: cognitive-mesh-api
                port:
                  name: health
          # Frontend (catch-all — must be last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cognitive-mesh-frontend
                port:
                  name: http
